name: Renovate

on:
  repository_dispatch:
    types: [renovate-trigger]

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.JIRA_AUTOMATION }}
          RENOVATE_REPOSITORIES: decaf-ts/utils
